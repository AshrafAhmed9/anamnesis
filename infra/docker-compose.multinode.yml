# Local 3-node CockroachDB cluster for demonstrating real database-level
# survivability (not just application-level retry): kill a node mid-write
# and show the cluster — and Anamnesis's writes — keep working.
#
# This is NOT how the hackathon submission is deployed (that's CockroachDB
# Cloud, see infra/README.md) — it's a free, reproducible way to demo what
# a multi-node CockroachDB deployment guarantees, without needing a paid
# multi-node Cloud cluster running for the whole build period.
#
# Usage: docker compose -f infra/docker-compose.multinode.yml up -d
#        docker compose -f infra/docker-compose.multinode.yml exec crdb-1 \
#          ./cockroach init --insecure
version: "3.8"

networks:
  default:
    name: anamnesis-multinode

services:
  crdb-1:
    image: cockroachdb/cockroach:latest-v25.2
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --http-addr=0.0.0.0:8080
    ports:
      - "26258:26257"
      - "8091:8080"

  crdb-2:
    image: cockroachdb/cockroach:latest-v25.2
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --http-addr=0.0.0.0:8080
    ports:
      - "26259:26257"
      - "8092:8080"

  crdb-3:
    image: cockroachdb/cockroach:latest-v25.2
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --http-addr=0.0.0.0:8080
    ports:
      - "26260:26257"
      - "8093:8080"
