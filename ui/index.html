<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Anamnesis — Agentic Memory</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0b0e14; --panel: #131722; --border: #232838; --text: #e6e9f0;
    --muted: #8b93a7; --accent: #5eead4; --accent2: #f0b429; --danger: #f87171;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex;
    align-items: baseline; gap: 12px; }
  header h1 { font-size: 18px; margin: 0; }
  header span { color: var(--muted); font-size: 13px; }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border);
    height: calc(100vh - 57px); }
  .panel { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
  .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); padding: 12px 16px; margin: 0; border-bottom: 1px solid var(--border); }
  .chat-log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.4; }
  .msg.user { align-self: flex-end; background: #1e3a5f; }
  .msg.agent { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
  .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); }
  .chat-input input { flex: 1; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 14px; }
  .chat-input button { background: var(--accent); color: #06231e; border: none;
    padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; }
  .memory-panel { display: flex; flex-direction: column; overflow-y: auto; }
  .section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .section h3 { font-size: 12px; color: var(--accent2); text-transform: uppercase;
    letter-spacing: 0.05em; margin: 0 0 8px; }
  .belief { padding: 8px 10px; background: var(--panel); border-radius: 6px; margin-bottom: 6px;
    font-size: 13px; border-left: 3px solid var(--accent); }
  .belief .meta { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .audit-row { font-size: 12px; padding: 4px 0; color: var(--muted); font-family: ui-monospace, monospace; }
  .audit-row .action { color: var(--accent2); font-weight: 600; }
  .audit-row .action.SUPERSEDE { color: var(--danger); }
  .audit-row .action.RETRY { color: #ff8c42; }
  .toolbar { display: flex; gap: 8px; padding: 8px 16px; }
  .toolbar button { background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .toolbar button:hover { border-color: var(--accent); }
  .empty { color: var(--muted); font-size: 13px; padding: 8px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = window.ANAMNESIS_API_BASE || "http://localhost:8000";

function useApi(path, intervalMs) {
  const [data, setData] = useState(null);
  const fetchIt = useCallback(() => {
    fetch(API_BASE + path).then(r => r.json()).then(setData).catch(() => {});
  }, [path]);
  useEffect(() => {
    fetchIt();
    if (intervalMs) {
      const id = setInterval(fetchIt, intervalMs);
      return () => clearInterval(id);
    }
  }, [fetchIt, intervalMs]);
  return [data, fetchIt];
}

function ChatPanel({ onMemoryChange }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [sessionId, setSessionId] = useState(null);
  const [sending, setSending] = useState(false);
  const logRef = useRef(null);

  useEffect(() => { logRef.current?.scrollTo(0, logRef.current.scrollHeight); }, [messages]);

  const send = async () => {
    if (!input.trim() || sending) return;
    const text = input;
    setInput("");
    setMessages(m => [...m, { role: "user", text }]);
    setSending(true);
    try {
      const resp = await fetch(API_BASE + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const body = await resp.json();
      setSessionId(body.session_id);
      setMessages(m => [...m, { role: "agent", text: body.reply }]);
      onMemoryChange();
    } catch (e) {
      setMessages(m => [...m, { role: "agent", text: "(error contacting agent — is the API running?)" }]);
    } finally {
      setSending(false);
    }
  };

  return (
    <div className="panel">
      <h2>Chat</h2>
      <div className="chat-log" ref={logRef}>
        {messages.length === 0 && <div className="empty">Say something — try telling it a preference, then contradict it later.</div>}
        {messages.map((m, i) => <div key={i} className={"msg " + m.role}>{m.text}</div>)}
      </div>
      <div className="chat-input">
        <input value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()} placeholder="Type a message..." />
        <button onClick={send} disabled={sending}>{sending ? "..." : "Send"}</button>
      </div>
    </div>
  );
}

function MemoryPanel({ refreshKey, triggerRefresh }) {
  const [beliefs, refetchBeliefs] = useApi("/memory/beliefs", 4000);
  const [audit, refetchAudit] = useApi("/memory/audit", 4000);

  useEffect(() => { refetchBeliefs(); refetchAudit(); }, [refreshKey]);

  const consolidate = async () => {
    await fetch(API_BASE + "/memory/consolidate", { method: "POST" });
    refetchBeliefs(); refetchAudit();
  };

  return (
    <div className="panel memory-panel">
      <h2>Live Memory</h2>
      <div className="toolbar">
        <button onClick={consolidate}>Trigger consolidation</button>
        <button onClick={() => { refetchBeliefs(); refetchAudit(); }}>Refresh</button>
      </div>
      <div className="section">
        <h3>Currently held beliefs</h3>
        {(!beliefs || beliefs.length === 0) && <div className="empty">No beliefs yet.</div>}
        {beliefs && beliefs.map(b => (
          <div className="belief" key={b.id}>
            {b.belief}
            <div className="meta">confidence {Number(b.confidence).toFixed(2)} · since {new Date(b.valid_from).toLocaleString()}</div>
          </div>
        ))}
      </div>
      <div className="section" style={{ flex: 1 }}>
        <h3>Audit stream</h3>
        {(!audit || audit.length === 0) && <div className="empty">No activity yet.</div>}
        {audit && audit.map(a => (
          <div className="audit-row" key={a.id}>
            <span className={"action " + a.action}>{a.action}</span> {new Date(a.at).toLocaleTimeString()} — {a.reason || ""}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [refreshKey, setRefreshKey] = useState(0);
  return (
    <React.Fragment>
      <header>
        <h1>🪳 Anamnesis</h1>
        <span>agentic memory on CockroachDB — transactional, temporal, self-correcting</span>
      </header>
      <main>
        <ChatPanel onMemoryChange={() => setRefreshKey(k => k + 1)} />
        <MemoryPanel refreshKey={refreshKey} />
      </main>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
