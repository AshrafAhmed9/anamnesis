name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start CockroachDB (single-node, insecure)
        run: |
          docker run -d --name crdb-ci --network host \
            cockroachdb/cockroach:latest-v25.2 start-single-node --insecure
          for i in $(seq 1 30); do
            docker exec crdb-ci ./cockroach sql --insecure -e "SELECT 1" && break
            sleep 2
          done

      - name: Configure CockroachDB for tests
        run: |
          docker exec crdb-ci ./cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS anamnesis_test;"
          docker exec crdb-ci ./cockroach sql --insecure -e "SET CLUSTER SETTING feature.vector_index.enabled = true;"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,langchain]"

      - name: Run Alembic migrations
        env:
          DATABASE_URL: "cockroachdb+psycopg://root@localhost:26257/anamnesis_test?sslmode=disable"
        run: alembic upgrade head

      - name: Lint
        run: ruff check .

      - name: Run tests
        env:
          ANAMNESIS_MOCK_LLM: "1"
          DATABASE_URL: "cockroachdb+psycopg://root@localhost:26257/anamnesis_test?sslmode=disable"
        run: pytest tests/ -v
